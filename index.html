<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Duplicate Sentence Remover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-badge">
            <span class="dot"></span>
            AI-Powered
        </div>
        <h1 class="title">Duplicate Sentence <span>Remover</span></h1>
        <p class="subtitle">Paste text or upload a file — get clean, deduplicated output instantly.</p>
    </div>

    <!-- Two-panel editor -->
    <div class="main-container">

        <!-- Input panel -->
        <div class="panel" id="inputPanel">
            <div class="panel-header">
                <div class="panel-label">
                    <span class="icon">✏️</span> Input
                </div>
                <span class="panel-meta" id="inputMeta">0 sentences</span>
            </div>

            <textarea id="inputText" placeholder="Paste your text here…" spellcheck="false"></textarea>

            <div class="panel-footer">
                <div class="file-upload-area">
                    <label for="fileInput" class="custom-file-upload">
                        📁 Upload file
                    </label>
                    <input type="file" id="fileInput" accept=".pdf,.docx,.pptx,.txt">
                    <span id="fileNameDisplay">PDF, DOCX, PPTX, TXT</span>
                </div>
            </div>
        </div>

        <!-- Stat divider -->
        <div class="divider">
            <div class="divider-line"></div>
            <div class="stat-chip">
                <span class="stat-value" id="removedCount">—</span>
                <span class="stat-label">Removed</span>
            </div>
            <div class="divider-line"></div>
        </div>

        <!-- Output panel -->
        <div class="panel" id="outputPanel">
            <div class="panel-header">
                <div class="panel-label">
                    <span class="icon">✅</span> Output
                </div>
                <button class="copy-btn" onclick="copyOutput()">📋 Copy</button>
            </div>

            <textarea id="outputText" placeholder="Clean output will appear here…" readonly spellcheck="false"></textarea>

            <div class="panel-footer">
                <span class="panel-meta" id="outputMeta">—</span>
            </div>
        </div>

    </div>
    <!-- Process button -->
    <div class="button-container">
        <button id="processBtn" onclick="removeDuplicates()">
            <span class="btn-icon">⚡</span>
            Remove Duplicates
        </button>
    </div>
    <script src="script.js"></script>
</body>
</html>
